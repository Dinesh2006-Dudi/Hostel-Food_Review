<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rate a Meal — HostelBite</title>
  <link rel="stylesheet" href="css/global.css" />
  <style>
    .review-wrap { max-width:620px; margin:0 auto; padding:28px 20px; }
    .meal-tabs { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:22px; }
    .meal-tab { border:2px solid var(--border); border-radius:14px; padding:14px 8px; text-align:center; cursor:pointer; background:#fff; transition:all .2s; }
    .meal-tab .tab-emoji { font-size:26px; }
    .meal-tab .tab-name  { font-size:12px; font-weight:600; color:var(--muted); margin-top:4px; }
    .meal-tab .tab-time  { font-size:10px; color:var(--muted); }
    .meal-tab.active { border-color:var(--saffron); background:var(--saffron-lt); }
    .meal-tab.active .tab-name { color:var(--saffron); }
    .rating-row { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:#FAFAFA; border-radius:12px; margin-bottom:10px; flex-wrap:wrap; gap:8px; }
    .rating-row .rl { font-weight:600; font-size:15px; }
    .overall-badge { border-radius:14px; padding:16px 20px; text-align:center; margin-top:10px; color:#fff; }
    .overall-badge .ob-label { font-size:13px; opacity:.9; }
    .overall-badge .ob-score { font-family:var(--font-head); font-size:36px; font-weight:900; }
    .overall-badge .ob-word  { font-size:14px; opacity:.9; margin-top:2px; }
    .success-screen { text-align:center; max-width:440px; margin:80px auto; padding:20px; display:none; }
    .success-screen .ss-card { padding:48px; }
    .ss-result { background:var(--saffron-lt); border-radius:16px; padding:20px; margin-bottom:24px; }
    .ss-emoji  { font-size:52px; margin-bottom:6px; }
    .ss-meal   { font-weight:700; font-size:18px; color:var(--text); }
    .ss-score  { font-family:var(--font-head); font-size:30px; font-weight:900; color:var(--saffron); margin-top:6px; }
    .section-card { margin-bottom:16px; }
    #review-form-wrap { }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>
  <div id="toast-container"></div>

  <!-- Success Screen -->
  <div class="success-screen" id="success-screen">
    <div class="card card-lg ss-card">
      <div style="font-size:72px;margin-bottom:14px">🎉</div>
      <h2 style="margin-bottom:8px">Review Submitted!</h2>
      <p style="margin-bottom:22px">Thank you! Your feedback helps improve hostel food for everyone.</p>
      <div class="ss-result">
        <div class="ss-emoji" id="ss-emoji">😊</div>
        <div class="ss-meal"  id="ss-meal">Breakfast</div>
        <div class="ss-score" id="ss-score">3.5 ⭐</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <button class="btn btn-secondary" onclick="resetReview()">Rate Another</button>
        <button class="btn btn-primary"   onclick="location.href='dashboard.html'">Dashboard →</button>
      </div>
    </div>
  </div>

  <!-- Review Form -->
  <div class="review-wrap" id="review-form-wrap">
    <div class="fade-in mb-24">
      <h1>⭐ Rate a Meal</h1>
      <p id="rating-as" style="margin-top:6px"></p>
    </div>

    <!-- Meal Tabs -->
    <div class="meal-tabs fade-in" id="meal-tabs"></div>

    <!-- Star Ratings -->
    <div class="card section-card fade-in delay-1">
      <h4 style="margin-bottom:14px">Rate the following criteria</h4>
      <div id="criteria-rows"></div>
      <div id="overall-badge" style="display:none" class="overall-badge"></div>
    </div>

    <!-- Emoji -->
    <div class="card section-card fade-in delay-2">
      <h4 style="margin-bottom:12px">How do you feel about this meal? <span style="color:var(--saffron)">*</span></h4>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>

    <!-- Tags -->
    <div class="card section-card fade-in delay-3">
      <h4 style="margin-bottom:12px">Quick Tags</h4>
      <div class="tags-row" id="tags-row"></div>
    </div>

    <!-- Comment -->
    <div class="card section-card fade-in delay-4">
      <h4 style="margin-bottom:10px">Your Comment <span style="color:var(--muted);font-size:13px;font-weight:400">(optional)</span></h4>
      <textarea class="form-textarea" id="comment" rows="4" maxlength="300" placeholder="Tell us what you thought about today's meal..."></textarea>
      <div class="form-hint" id="char-count">0 / 300 characters</div>
    </div>

    <button class="btn btn-primary btn-full btn-lg fade-in" id="submit-btn" onclick="submitReview()" style="box-shadow:0 6px 22px rgba(232,88,10,0.3)">
      Submit Review 🚀
    </button>
  </div>

  <script src="js/app.js"></script>
  <script src="js/review.js"></script>
</body>
</html>
