<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — HostelBite</title>
  <link rel="stylesheet" href="css/global.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; background:linear-gradient(135deg,#FFF8F0,#E8F5E9); }
    .auth-card { width:100%; max-width:480px; padding:40px; }
    .step-header { text-align:center; margin-bottom:28px; }
    .step-header .step-icon { font-size:46px; margin-bottom:8px; }
    .step-header h1 { margin-bottom:6px; }
    .progress-wrap { margin: 10px 0 6px; }
    .step-label { font-size:13px; color:var(--muted); text-align:center; }
    .region-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px; }
    .auth-footer { text-align:center; margin-top:18px; font-size:14px; color:var(--muted); }
    .auth-footer a { color:var(--saffron); font-weight:700; text-decoration:none; }
    .step-panel { display:none; }
    .step-panel.active { display:block; }
    .btn-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
  </style>
</head>
<body>

  <div class="card card-lg auth-card fade-in">
    <!-- Header -->
    <div class="step-header">
      <div class="step-icon">📝</div>
      <h1>Create Account</h1>
      <!-- Progress bar -->
      <div class="progress-wrap">
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progress-fill" style="background:linear-gradient(90deg,var(--saffron),var(--turmeric));width:50%"></div>
        </div>
      </div>
      <div class="step-label" id="step-label">Step 1 of 2 — Basic Information</div>
    </div>

    <!-- STEP 1: Basic Info -->
    <div class="step-panel active" id="step1">
      <div class="form-group">
        <label class="form-label" for="name">Full Name <span class="required">*</span></label>
        <input class="form-input" type="text"     id="name"      placeholder="Arjun Sharma" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email Address <span class="required">*</span></label>
        <input class="form-input" type="email"    id="email"     placeholder="arjun@hostel.in" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password <span class="required">*</span></label>
        <input class="form-input" type="password" id="password"  placeholder="Minimum 6 characters" required minlength="6" />
      </div>
      <div class="form-group">
        <label class="form-label" for="studentId">Student ID / Roll Number <span class="required">*</span></label>
        <input class="form-input" type="text"     id="studentId" placeholder="CS2021001" required />
      </div>
      <button class="btn btn-primary btn-full" id="step1-next">Continue →</button>
    </div>

    <!-- STEP 2: Hostel & Region -->
    <div class="step-panel" id="step2">
      <div class="form-group">
        <label class="form-label" for="room">Room Number <span class="required">*</span></label>
        <input class="form-input" type="text" id="room" placeholder="A-101" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="course">Course / Department <span class="required">*</span></label>
        <input class="form-input" type="text" id="course" placeholder="B.Tech CSE" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="year">Year of Study</label>
        <select class="form-select" id="year">
          <option value="1st">1st Year</option>
          <option value="2nd">2nd Year</option>
          <option value="3rd" selected>3rd Year</option>
          <option value="4th">4th Year</option>
        </select>
      </div>

      <!-- Region -->
      <div class="form-group">
        <label class="form-label">Your Region <span class="required">*</span></label>
        <div class="region-grid">
          <div class="region-card north" id="region-north" onclick="selectRegion('North')">
            <div class="region-icon">🟠</div>
            <div class="region-name">North India</div>
            <div class="region-desc">UP, Bihar, Delhi, Rajasthan...</div>
          </div>
          <div class="region-card south" id="region-south" onclick="selectRegion('South')">
            <div class="region-icon">🟢</div>
            <div class="region-name">South India</div>
            <div class="region-desc">TN, Kerala, Karnataka, AP...</div>
          </div>
        </div>
      </div>

      <!-- State -->
      <div class="form-group" id="state-group" style="display:none">
        <label class="form-label" for="state">Home State <span class="required">*</span></label>
        <select class="form-select" id="state">
          <option value="">Select State</option>
        </select>
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" id="step2-back">← Back</button>
        <button class="btn btn-primary"   id="step2-submit">Create Account 🎉</button>
      </div>
    </div>

    <div class="auth-footer">
      Already registered? <a href="login.html">Login</a>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/app.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
